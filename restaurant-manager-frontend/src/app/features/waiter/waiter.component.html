<h1 class="text-2xl font-bold bg-amber-700 text-white p-6 pb-2">Sala</h1>
<div
  class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 p-6 min-h-screen w-full bg-amber-700 text-white items-start">
  <div *ngFor="let order of orders">
    <ul>
      <li>{{order._id}}</li>
    </ul>
    <div *ngFor="let item of order.items">
      {{item.product.nombre}}
    </div>
    <p>{{order.status}}</p>
  </div>
</div>
