<h1 class="text-2xl font-bold bg-amber-600 text-white p-6 pb-2">🍽 Pedidos Entrantes</h1>

<div
  class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 p-6 min-h-screen w-full bg-amber-700 text-white items-start">

  <div *ngFor="let order of orders"
    class="bg-white text-black shadow-md rounded-xl p-4 border-l-4 border-zinc-300 h-fit">

    <p class="font-bold text-sm border-b mb-2 pb-1">
      Orden: {{ order._id }} </p>

    <div class="flex justify-between mb-2">
      <span class="font-semibold text-amber-800">Mesa: {{ order.table.number }}</span>
      <span class="text-sm px-2 py-0.5 bg-zinc-100 rounded-full uppercase">{{ order.status }}</span>
    </div>

    <div class="space-y-1">
      <div *ngFor="let item of order.items" class="flex justify-between text-sm">
        <span>{{ item.product.nombre }}</span>
        <span class="font-bold">x{{ item.quantity }}</span>
      </div>
    </div>

    <div class="flex justify-around gap-2 mt-2">
      <button
        class="bg-emerald-700 hover:bg-emerald-600 text-white  py-1 px-2 rounded-lg shadow-md hover:shadow-lg transition-all duration-200 active:scale-95"
        (click)="changeStatus(order._id, 'preparing')">
        Preparando
      </button>

      <button
        class="bg-emerald-700 hover:bg-emerald-600 text-white  py-1 px-2 rounded-lg shadow-md hover:shadow-lg transition-all duration-200 active:scale-95"
        (click)="changeStatus(order._id, 'ready')">
        Listo
      </button>

    </div>

    <div class="mt-4 pt-2 text-xs text-gray-500 border-t italic">
      🧾 Obs: {{ order.observations || 'Sin notas' }}
    </div>
  </div>

</div>
